<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard - Sciverse Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Theme initialization script - prevents flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode-loading');
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    
    <style>
        /* Styles for the Layout Structure */
        :root {
            --sidebar-width: 250px;
        }
        .sidebar {
            position: fixed;
            top: 80px;
            left: 0;
            height: calc(100% - 80px);
            width: var(--sidebar-width); 
            padding-top: 0.5rem; 
            background-color: #f8f9fa;
            z-index: 1000; 
            transition: all 0.3s;
        }
        .content {
            margin-left: var(--sidebar-width); 
            padding: 95px 20px 20px 20px; 
            position: relative; 
            z-index: 1;
            transition: all 0.3s;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        /* Style for when the sidebar is collapsed */
        #sidebarMenu.collapsing, #sidebarMenu.collapse:not(.show) {
            margin-left: calc(-1 * var(--sidebar-width));
        }
        
        .welcome-text {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 40px;
            text-align: center;
        }
        .action-btn {
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border-radius: 12px;
            min-width: 200px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-history {
            background-color: #4b5563;
            color: white;
            border: none;
        }
        .btn-history:hover {
            background-color: #374151;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(75, 85, 99, 0.3);
        }
        .btn-create {
            background: linear-gradient(135deg, #4f46e5, #6366f1);
            color: white;
            border: none;
        }
        .btn-create:hover {
            background: linear-gradient(135deg, #4338ca, #4f46e5);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.4);
        }

        /* Glassmorphism Modal Styles */
        .modal-content {
            background: rgba(255, 255, 255, 0.1) !important;
            backdrop-filter: blur(28px) saturate(160%);
            -webkit-backdrop-filter: blur(28px) saturate(160%);
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-top-color: rgba(255, 255, 255, 0.32) !important;
            border-radius: 20px !important;
            box-shadow: 0 32px 72px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255, 255, 255, 0.15) !important;
        }

        .modal-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.15) !important;
        }

        .modal-title {
            color: rgba(255, 255, 255, 0.95);
            font-size: 1.25rem;
        }

        .modal-body {
            color: rgba(255, 255, 255, 0.88);
        }

        .form-label {
            color: rgba(255, 255, 255, 0.85);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .form-control, .form-select {
            background: rgba(255, 255, 255, 0.08) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            border-radius: 10px !important;
            color: rgba(255, 255, 255, 0.95) !important;
            padding: 12px 16px;
        }

        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.4);
        }

        .form-control:focus, .form-select:focus {
            background: rgba(255, 255, 255, 0.12) !important;
            border-color: rgba(255, 255, 255, 0.4) !important;
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.1) !important;
            color: rgba(255, 255, 255, 0.95) !important;
        }

        .form-select option {
            background: #1e293b;
            color: #fff;
        }

        .btn-close-white {
            filter: brightness(1) invert(1);
            opacity: 0.8;
        }

        .btn-close-white:hover {
            opacity: 1;
        }

        /* Modal Buttons */
        .modal .btn-primary {
            background: rgba(79, 70, 229, 0.9);
            border: 1px solid rgba(79, 70, 229, 0.5);
            color: rgba(255, 255, 255, 0.95);
            font-weight: 600;
        }

        .modal .btn-primary:hover {
            background: rgba(79, 70, 229, 1);
            border-color: rgba(79, 70, 229, 0.8);
        }

        .modal .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            border: 1px solid rgba(16, 185, 129, 0.5);
            color: rgba(255, 255, 255, 0.95);
            font-weight: 700;
        }

        .modal .btn-success:hover {
            background: linear-gradient(135deg, #059669, #047857);
            border-color: rgba(16, 185, 129, 0.8);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
        }

        .modal .btn-outline-danger {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            color: #fca5a5;
        }

        .modal .btn-outline-danger:hover {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.6);
            color: #fecaca;
        }

        /* Dark Mode */
        body.dark-mode {
            background: #0f172a !important;
        }

        body.dark-mode .welcome-text {
            color: #f1f5f9 !important;
        }

        body.dark-mode .content {
            background: #0f172a !important;
        }

        /* Dark mode for buttons */
        body.dark-mode .btn-history {
            background: linear-gradient(135deg, #475569, #64748b);
            color: #f1f5f9;
        }

        body.dark-mode .btn-history:hover {
            background: linear-gradient(135deg, #64748b, #475569);
        }

        body.dark-mode .btn-create {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
        }

        body.dark-mode .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
        }

        body.dark-mode .text-muted {
            color: #94a3b8 !important;
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (NAVBAR) FRAGMENT -->
    <div th:replace="fragments :: header"></div>

    <!-- 2. SIDEBAR FRAGMENT (REMOVED for Dashboard) -->
    <!-- <div th:replace="fragments :: sidebar"></div> -->

    <!-- 3. MAIN CONTENT AREA -->
    <div class="content" style="margin-left: 0;">
        
        <h1 class="welcome-text">Welcome! What would you like to do today?</h1>
        
        <div class="d-flex gap-4 align-items-start">
            <a href="/history" class="btn action-btn btn-history text-decoration-none d-flex align-items-center justify-content-center">
                <i class="bi bi-clock-history"></i> History
            </a>
            <button class="btn action-btn btn-create" data-bs-toggle="modal" data-bs-target="#createSessionModal">
                <i class="bi bi-plus-circle-fill"></i> Create Session
            </button>
            
            <!-- Active Session Button -->
            <div th:if="${activeSession != null}" class="text-center">
                <button class="btn action-btn btn-primary" data-bs-toggle="modal" data-bs-target="#continueSessionModal">
                    <i class="bi bi-play-circle-fill"></i>
                    <span th:text="${activeSession.name}">Session Name</span>
                </button>
                <div class="mt-2 text-muted small">Continue Session</div>
            </div>
        </div>

    </div>

    <!-- Continue Session Modal -->
    <div class="modal fade" id="continueSessionModal" tabindex="-1" aria-hidden="true" th:if="${activeSession != null}">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold">
                        <i class="bi bi-gear-fill me-2" style="opacity: 0.75;"></i>Manage Session
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center py-4">
                    <h4 class="mb-4" th:text="${activeSession.name}">Session Name</h4>
                    <p class="mb-4" style="color: rgba(255,255,255,0.7);">What would you like to do with this session?</p>
                    
                    <div class="d-grid gap-3 col-8 mx-auto">
                        <a href="/" class="btn btn-primary btn-lg d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-arrow-right-circle-fill"></i> Continue Session
                        </a>
                        
                        <form th:action="@{/session/end}" method="post">
                            <input type="hidden" name="sessionId" th:value="${activeSession.id}" />
                            <button type="submit" class="btn btn-outline-danger w-100 d-flex align-items-center justify-content-center gap-2">
                                <i class="bi bi-stop-circle-fill"></i> End Session
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Create Session Modal -->
    <div class="modal fade" id="createSessionModal" tabindex="-1" aria-labelledby="createSessionModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title fw-bold" id="createSessionModalLabel">
                        <i class="bi bi-plus-square-fill me-2" style="opacity: 0.75;"></i>Create New Session
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form th:action="@{/session/create}" th:object="${newSession}" method="post">
                        <div class="mb-3">
                            <label for="sessionName" class="form-label">
                                <i class="bi bi-tag-fill me-1"></i> Name of the Session
                            </label>
                            <input type="text" class="form-control" id="sessionName" th:field="*{name}" placeholder="Enter session name..." required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="committee" class="form-label">
                                <i class="bi bi-mortarboard-fill me-1"></i> Committee
                            </label>
                            <select class="form-select" id="committee" th:field="*{committee}" required>
                                <option value="Physics">Physics</option>
                                <option value="Chemistry">Chemistry</option>
                                <option value="Biology">Biology</option>
                                <option value="Computer Science">Computer Science</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label for="strength" class="form-label">
                                <i class="bi bi-people-fill me-1"></i> Strength (Number of Participants)
                            </label>
                            <input type="number" class="form-control" id="strength" th:field="*{strength}" placeholder="Enter number of participants..." min="1" required>
                        </div>
                        
                        <div class="mb-4">
                            <label for="topic" class="form-label">
                                <i class="bi bi-chat-left-text-fill me-1"></i> Topic of the session
                            </label>
                            <input type="text" class="form-control" id="topic" th:field="*{topic}" placeholder="Enter session topic..." required>
                        </div>
                        
                        <button type="submit" class="btn btn-success w-100 py-2 fw-bold d-flex align-items-center justify-content-center gap-2">
                            <i class="bi bi-check-circle-fill"></i> Create Session
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Theme Toggle Script -->
    <script>
        // Dark/Light Mode Toggle Function
        window.setTheme = function(theme) {
            console.log('setTheme called with:', theme);
            const html = document.documentElement;
            const body = document.body;
            const lightCard = document.getElementById('lightThemeCard');
            const darkCard = document.getElementById('darkThemeCard');
            const lightBadge = document.getElementById('lightBadge');
            const darkBadge = document.getElementById('darkBadge');
            
            console.log('Elements found:', {lightCard: !!lightCard, darkCard: !!darkCard});
            
            if (theme === 'dark') {
                // Apply dark mode to html and body
                html.classList.remove('dark-mode-loading');
                html.classList.add('dark-mode');
                body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
                console.log('Applied dark-mode class');
                
                // Update cards if they exist
                if (lightCard && darkCard) {
                    // Update light card (inactive)
                    const lightInner = lightCard.querySelector('.theme-card-inner');
                    lightInner.style.background = 'rgba(255,255,255,0.04)';
                    lightInner.style.borderColor = 'rgba(255,255,255,0.1)';
                    lightCard.querySelector('.bi-sun').style.color = 'rgba(255,255,255,0.5)';
                    lightCard.querySelectorAll('span')[0].style.color = 'rgba(255,255,255,0.5)';
                    if (lightBadge) lightBadge.style.visibility = 'hidden';
                    
                    // Update dark card (active)
                    const darkInner = darkCard.querySelector('.theme-card-inner');
                    darkInner.style.background = 'rgba(255,255,255,0.07)';
                    darkInner.style.borderColor = 'rgba(255,255,255,0.35)';
                    darkCard.querySelector('.bi-moon-stars').style.color = 'rgba(255,255,255,0.85)';
                    darkCard.querySelectorAll('span')[0].style.color = 'rgba(255,255,255,0.9)';
                    if (darkBadge) darkBadge.style.visibility = 'visible';
                }
            } else {
                // Remove dark mode from html and body
                html.classList.remove('dark-mode-loading');
                html.classList.remove('dark-mode');
                body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
                console.log('Removed dark-mode class');
                
                // Update cards if they exist
                if (lightCard && darkCard) {
                    // Update light card (active)
                    const lightInner = lightCard.querySelector('.theme-card-inner');
                    lightInner.style.background = 'rgba(255,255,255,0.07)';
                    lightInner.style.borderColor = 'rgba(255,255,255,0.35)';
                    lightCard.querySelector('.bi-sun').style.color = 'rgba(255,255,255,0.85)';
                    lightCard.querySelectorAll('span')[0].style.color = 'rgba(255,255,255,0.9)';
                    if (lightBadge) lightBadge.style.visibility = 'visible';
                    
                    // Update dark card (inactive)
                    const darkInner = darkCard.querySelector('.theme-card-inner');
                    darkInner.style.background = 'rgba(255,255,255,0.04)';
                    darkInner.style.borderColor = 'rgba(255,255,255,0.1)';
                    darkCard.querySelector('.bi-moon-stars').style.color = 'rgba(255,255,255,0.5)';
                    darkCard.querySelectorAll('span')[0].style.color = 'rgba(255,255,255,0.5)';
                    if (darkBadge) darkBadge.style.visibility = 'hidden';
                }
            }
        };
        
        // Load saved theme on page load
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('theme');
            console.log('DOMContentLoaded - savedTheme:', savedTheme);
            if (savedTheme) {
                setTheme(savedTheme);
            }
        });
    </script>
</body>
</html>
