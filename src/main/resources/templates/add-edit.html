<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${presentation.id == null ? 'Add New Delegate' : 'Edit Delegate'}"></title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Theme initialization script - prevents flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode-loading');
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    
    <style>
        /* Layout CSS */
        :root {
            --sidebar-width: 250px;
        }
        .sidebar {
            position: fixed;
            top: 80px;
            left: 0;
            height: calc(100% - 80px);
            width: var(--sidebar-width); 
            padding-top: 0.5rem; 
            background-color: #f8f9fa;
            z-index: 1000; 
            transition: all 0.3s;
        }
        .content {
            margin-left: var(--sidebar-width); 
            padding: 95px 20px 20px 20px; 
            position: relative; 
            z-index: 1;
            transition: all 0.3s;
        }
        #sidebarMenu.collapsing, #sidebarMenu.collapse:not(.show) {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        /* Modern Page Heading */
        .page-heading {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        /* Modern Form Card */
        .form-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            padding: 32px;
            max-width: 600px;
            margin: 0 auto;
        }

        /* Form Labels */
        .form-label {
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        /* Form Inputs */
        .form-control {
            border: 1px solid #cbd5e1;
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 0.95rem;
            font-weight: 500;
            color: #1e293b;
            background: #f8fafc;
            transition: all 0.15s;
        }

        .form-control:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
            background: #fff;
        }

        /* Toggle Switches */
        .form-check {
            padding: 16px 20px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            margin-bottom: 16px;
            transition: all 0.15s;
        }

        .form-check:hover {
            background: #f1f5f9;
        }

        .form-check-label {
            font-size: 0.95rem;
            font-weight: 600;
            color: #475569;
            margin-left: 8px;
        }

        .form-check-input {
            width: 48px;
            height: 26px;
            cursor: pointer;
        }

        .form-check-input:checked {
            background-color: #10b981;
            border-color: #10b981;
        }

        /* Modern Buttons */
        .btn-save {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-save:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            color: #fff;
        }

        .btn-cancel {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            padding: 12px 28px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-cancel:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.35);
            text-decoration: none;
        }

        /* ================================
           DARK MODE STYLES
           ================================ */
        body.dark-mode {
            background: #0f172a;
        }

        body.dark-mode .content {
            background: #0f172a;
        }

        body.dark-mode .page-heading {
            color: #f1f5f9;
        }

        body.dark-mode .form-card {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        body.dark-mode .form-label {
            color: #cbd5e1;
        }

        body.dark-mode .form-control {
            background: #334155;
            border-color: #475569;
            color: #e2e8f0;
        }

        body.dark-mode .form-control:focus {
            background: #475569;
            border-color: #3b82f6;
            color: #f1f5f9;
        }

        body.dark-mode .form-check {
            background: #334155;
            border-color: #475569;
        }

        body.dark-mode .form-check:hover {
            background: #475569;
        }

        body.dark-mode .form-check-label {
            color: #cbd5e1;
        }

        body.dark-mode .btn-cancel {
            background: linear-gradient(135deg, #ef4444, #dc2626);
            color: #fff;
            border: none;
            text-decoration: none;
        }

        body.dark-mode .btn-cancel:hover {
            background: linear-gradient(135deg, #dc2626, #b91c1c);
            color: #fff;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (NAVBAR) FRAGMENT -->
    <div th:replace="fragments :: header"></div>

    <!-- 2. SIDEBAR FRAGMENT -->
    <div th:replace="fragments :: sidebar"></div>

    <!-- 3. MAIN CONTENT AREA -->
    <div class="content">
        <!-- Page Heading -->
        <h2 class="page-heading text-center mb-4">
            <i class="bi bi-person-plus-fill me-2" th:if="${presentation.id == null}"></i>
            <i class="bi bi-pencil-fill me-2" th:if="${presentation.id != null}"></i>
            <span th:text="${presentation.id == null ? 'Add New Delegate' : 'Edit Delegate'}"></span>
        </h2>

        <!-- Form Card -->
        <div class="form-card">
            <form action="#" th:action="@{/save}" th:object="${presentation}" method="post">
                
                <!-- Hidden ID for Update functionality -->
                <input type="hidden" th:field="*{id}"> 

                <!-- Name Field -->
                <div class="mb-4">
                    <label for="name" class="form-label">
                        <i class="bi bi-person me-1"></i>Delegate Name
                    </label>
                    <input type="text" th:field="*{name}" class="form-control" id="name" 
                           placeholder="Enter delegate name..." required>
                </div>

                <!-- Presenting Toggle Switch -->
                <div class="form-check form-switch"> 
                    <input type="checkbox" th:field="*{presenting}" class="form-check-input" role="switch" id="presenting">
                    <label class="form-check-label" for="presenting">
                        <i class="bi bi-mic-fill me-2" style="color: #3b82f6;"></i>Is Presenting?
                    </label>
                </div>

                <!-- Voting Toggle Switch -->
                <div class="form-check form-switch">
                    <input type="checkbox" th:field="*{voting}" class="form-check-input" role="switch" id="voting">
                    <label class="form-check-label" for="voting">
                        <i class="bi bi-check-circle-fill me-2" style="color: #10b981;"></i>Is Voting?
                    </label>
                </div>

                <!-- Button Group -->
                <div class="d-flex gap-3 mt-4 justify-content-center">
                    <button type="submit" class="btn-save">
                        <i class="bi bi-save-fill"></i>Save Delegate
                    </button>
                    <a th:href="@{/}" class="btn-cancel">
                        <i class="bi bi-x-circle-fill"></i>Cancel
                    </a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
