<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Motion Setup - SciVerse Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode-loading');
                if (document.body) document.body.classList.add('dark-mode');
                else document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
            }
        })();
    </script>

    <style>
        /* ================================
           THEME VARIABLES (Light Default)
           ================================ */
        :root {
            --sidebar-width: 250px;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-secondary: #f1f5f9;
            --bg-elevated: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --border-strong: #cbd5e1;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.08);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --bg-secondary: #334155;
            --bg-elevated: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --border-strong: #475569;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.4);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ================================
           SIDEBAR LAYOUT
           ================================ */
        .sidebar {
            position: fixed; top: 80px; left: 0;
            height: calc(100% - 80px); width: var(--sidebar-width);
            padding-top: 0.5rem;
            background-color: var(--bg-secondary);
            z-index: 1000; transition: all 0.3s;
        }
        .content {
            margin-left: var(--sidebar-width);
            padding: 95px 20px 20px 20px;
            position: relative; z-index: 1;
            transition: all 0.3s;
        }
        @media (max-width: 991.98px) {
            .sidebar { width: 0; }
            .content { margin-left: 0; }
        }
        #sidebarMenu.collapsing, #sidebarMenu.collapse:not(.show) {
            transform: translateX(calc(-1 * var(--sidebar-width)));
            margin-left: 0;
        }

        /* ================================
           PAGE HEADING
           ================================ */
        .page-heading {
            font-size: 1.6rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .page-heading i { color: var(--accent-primary); }

        /* ================================
           MAIN FORM CARD
           ================================ */
        .form-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            padding: 32px;
            transition: box-shadow 0.2s;
        }
        .form-card:hover { box-shadow: var(--shadow-lg); }

        /* ================================
           FORM LABELS & INPUTS
           ================================ */
        .form-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.06em;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .form-label i {
            color: var(--accent-primary);
            font-size: 1rem;
        }

        .form-control, .form-select {
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            padding: 12px 16px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .form-control::placeholder { color: var(--text-muted); }

        /* Match heights of large form controls */
        .input-group .form-control-lg,
        .input-group .form-select-lg {
            height: calc(3.25rem + 2px);
            font-size: 1rem;
        }
        .input-group .btn-lg {
            min-width: 56px;
            border-top-right-radius: 10px !important;
            border-bottom-right-radius: 10px !important;
        }
        .input-group > .form-control:not(:last-child),
        .input-group > .form-select:not(:last-child) {
            border-top-right-radius: 0 !important;
            border-bottom-right-radius: 0 !important;
        }

        /* Search/inline-action button next to inputs */
        .input-group .btn-outline-secondary {
            background: var(--bg-secondary);
            border: 1px solid var(--border-strong);
            color: var(--text-secondary);
            transition: all 0.15s;
        }
        .input-group .btn-outline-secondary:hover {
            background: var(--accent-primary);
            border-color: var(--accent-primary);
            color: white;
        }

        /* Proposer input - subtle accent (was harsh red before) */
        .proposer-input .form-control {
            border-color: var(--border-strong);
            box-shadow: none;
        }
        .proposer-input .form-control:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        /* Highlight when empty + after attempt to add */
        .proposer-input.is-invalid .form-control {
            border-color: var(--accent-danger);
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.15);
        }

        /* ================================
           PLUS / ADD BUTTON
           ================================ */
        .plus-button-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 18px;
            margin: 24px 0 8px 0;
            cursor: pointer;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(59, 130, 246, 0.25);
        }
        .plus-button-container:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59, 130, 246, 0.35);
        }
        .plus-button-container:active {
            transform: translateY(0);
        }
        .plus-button-container i {
            font-size: 1.4rem;
            color: white;
        }

        /* ================================
           TOGGLE SWITCHES (containers)
           ================================ */
        .toggles-row {
            display: flex;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        .toggle-card {
            flex: 1 1 220px;
            padding: 14px 18px;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            transition: all 0.15s;
        }
        .toggle-card:hover {
            background: var(--bg-card);
            border-color: var(--border-strong);
        }
        .toggle-card .form-check {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            min-height: auto;
            padding-left: 0;
        }
        .toggle-card .form-check-input {
            width: 44px;
            height: 24px;
            margin: 0;
            cursor: pointer;
            flex-shrink: 0;
        }
        .toggle-card .form-check-input:checked {
            background-color: var(--accent-success);
            border-color: var(--accent-success);
        }
        .toggle-card .form-check-label {
            cursor: pointer;
            font-weight: 500;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0;
        }
        .toggle-card .form-check-label i {
            color: var(--accent-primary);
        }

        /* ================================
           FOOTER (info bar + clear link)
           ================================ */
        .motion-footer {
            margin-top: 28px;
            padding-top: 18px;
            border-top: 1px solid var(--border-color);
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .motion-footer .info-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .motion-footer .info-text i {
            color: var(--accent-primary);
        }
        .clear-link {
            text-decoration: none;
            color: var(--accent-danger);
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.15s;
        }
        .clear-link:hover {
            background: rgba(239, 68, 68, 0.1);
            color: var(--accent-danger);
            text-decoration: none;
        }

        /* ================================
           ADDED MOTION CARDS (JS-rendered)
           ================================ */
        #motions-container .card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 14px;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            overflow: hidden;
        }
        #motions-container .card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        #motions-container .card-header {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.10), rgba(37, 99, 235, 0.04)) !important;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-primary) !important;
            font-weight: 700 !important;
            padding: 14px 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #motions-container .card-header::before {
            content: "\F4D5"; /* bi-megaphone */
            font-family: "bootstrap-icons";
            color: var(--accent-primary);
            font-size: 1.1rem;
        }
        #motions-container .card-body {
            background: var(--bg-card);
            color: var(--text-primary);
            padding: 18px 20px;
        }
        #motions-container .card-body .card-text {
            color: var(--text-secondary);
        }
        #motions-container .card-body .card-text strong {
            color: var(--text-primary);
        }
        #motions-container .btn-primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
            border: none !important;
            border-radius: 8px !important;
            font-weight: 600;
            padding: 8px 16px;
            transition: all 0.15s;
        }
        #motions-container .btn-primary:hover {
            background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }

        /* ================================
           DARK MODE TWEAKS
           ================================ */
        body.dark-mode .form-control,
        body.dark-mode .form-select {
            background: var(--bg-secondary);
        }
        body.dark-mode .form-control:focus,
        body.dark-mode .form-select:focus {
            background: var(--bg-secondary);
        }
        body.dark-mode .input-group .btn-outline-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-color: var(--border-strong);
        }
        body.dark-mode .toggle-card {
            background: var(--bg-secondary);
        }
        body.dark-mode .toggle-card:hover {
            background: var(--border-strong);
        }
        body.dark-mode #motions-container .card-header {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.18), rgba(37, 99, 235, 0.06)) !important;
        }
        body.dark-mode .clear-link:hover {
            background: rgba(239, 68, 68, 0.18);
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (NAVBAR) FRAGMENT: Assumed to be included via Thymeleaf -->
    <div th:replace="fragments :: header"></div>

    <!-- 2. SIDEBAR FRAGMENT: Assumed to be included via Thymeleaf -->
    <div th:replace="fragments :: sidebar"></div>

    <!-- 3. MAIN CONTENT AREA -->
    <div class="content">
        <div class="container-fluid">

            <div class="row justify-content-center">
                <div class="col-lg-7 col-md-9">

                    <h2 class="page-heading">
                        <i class="bi bi-card-checklist"></i>
                        <span>Set Caucus Details</span>
                    </h2>

                    <div class="form-card">

                        <!-- MOTION TYPE DROPDOWN -->
                        <div class="mb-3">
                            <label for="motion-type-select" class="form-label">
                                <i class="bi bi-tag-fill"></i>
                                <span>Type</span>
                            </label>
                            <div class="input-group">
                                <!-- Populated by JS -->
                                <select id="motion-type-select" class="form-select form-select-lg" aria-label="Motion Type">
                                    <option value="" selected disabled>Select a motion type</option>
                                </select>
                                <button class="btn btn-outline-secondary btn-lg" type="button" title="Search options">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- PROPOSER INPUT -->
                        <div class="mb-3">
                            <label for="proposer-input" class="form-label">
                                <i class="bi bi-person-fill"></i>
                                <span>Proposer</span>
                            </label>
                            <div class="input-group proposer-input">
                                <input type="text" id="proposer-input" class="form-control form-control-lg" placeholder="Start typing delegate name..." aria-label="Proposer Name" required list="delegate-list">
                                <datalist id="delegate-list">
                                    <option th:each="delegate : ${delegateList}" th:value="${delegate}"></option>
                                </datalist>
                                <button class="btn btn-outline-secondary btn-lg" type="button" title="Search delegates">
                                    <i class="bi bi-search"></i>
                                </button>
                            </div>
                        </div>

                        <!-- DURATION INPUT -->
                        <div class="mb-3">
                            <label for="duration-input" class="form-label">
                                <i class="bi bi-clock-fill"></i>
                                <span>Duration</span>
                            </label>
                            <div class="row g-2">
                                <div class="col-6">
                                    <input type="number" id="duration-input" class="form-control form-control-lg" value="10" min="1">
                                </div>
                                <div class="col-6">
                                    <select id="duration-unit-select" class="form-select form-select-lg">
                                        <option value="min" selected>min</option>
                                        <option value="sec">sec</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <!-- ADD BUTTON (Stylized Plus) -->
                        <div class="plus-button-container" id="add-motion-button" role="button" tabindex="0">
                            <i class="bi bi-plus-circle-fill"></i>
                            <span>Add Motion</span>
                        </div>

                        <!-- TOGGLES -->
                        <div class="toggles-row">
                            <div class="toggle-card">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch" id="can-propose" checked>
                                    <label class="form-check-label" for="can-propose">
                                        <i class="bi bi-chat-square-quote-fill"></i>
                                        <span>Delegates can propose motions</span>
                                    </label>
                                </div>
                            </div>
                            <div class="toggle-card">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" role="switch" id="can-vote" checked>
                                    <label class="form-check-label" for="can-vote">
                                        <i class="bi bi-check2-square"></i>
                                        <span>Delegates can vote on motions</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- FOOTER TEXT -->
                        <div class="motion-footer">
                            <div class="info-text">
                                <i class="bi bi-info-circle-fill"></i>
                                <span>Sorted from most to least disruptive. 14 votes required to pass a motion.</span>
                            </div>
                            <a href="#" class="clear-link" onclick="handleClear(event)">
                                <i class="bi bi-x-circle-fill"></i>
                                <span>Clear</span>
                            </a>
                        </div>
                    </div>

                    <!-- Container for Added Motions -->
                    <div id="motions-container" class="mt-4">
                        <!-- Cards will be appended here -->
                    </div>

                </div>
            </div>
        </div>
    </div>
    
    <!-- JavaScript for Functionality -->
    <script>
        // List of motions as per the image
        const parliamentaryMotions = [
            "Open unmoderated caucus",
            "Open moderated caucus",
            "Extend unmoderated caucus",
            "Extend moderated caucus",
            "Close moderated caucus",
            "Introduce draft resolution",
            "Introduce amendment",
            "Vote on resolution",
            "Vote on amendment",
            "Roll Call",
            "Point of Parliamentary Procedure",
            "Point of Personal Privilege",
            "Point of Inquiry",
            "Point of Information",
            "Suspend Meeting",
            "Adjourn Meeting",
            "Set Speakers Time"
        ];

        function populateMotionTypeDropdown() {
            const select = document.getElementById('motion-type-select');
            
            // Clear existing options except the first placeholder
            while (select.options.length > 1) {
                select.remove(1);
            }

            parliamentaryMotions.forEach(motion => {
                const option = document.createElement('option');
                option.value = motion;
                option.textContent = motion;
                select.appendChild(option);
            });
            
            // Set the default selected option based on the screenshot
            select.value = "Open unmoderated caucus"; 
        }

        function handleClear(event) {
            event.preventDefault(); // Prevent link default action
            
            // Clear Proposer
            document.getElementById('proposer-input').value = '';
            
            // Reset Duration
            document.getElementById('duration-input').value = 10;
            document.getElementById('duration-unit-select').value = 'min';

            // Reset Toggles (assuming default is checked)
            document.getElementById('can-propose').checked = true;
            document.getElementById('can-vote').checked = true;
            
            // Optionally reset motion type to default or first one
            document.getElementById('motion-type-select').value = "Open unmoderated caucus";
            
            // Clear added motions
            document.getElementById('motions-container').innerHTML = '';

            console.log('Form cleared successfully.');
        }

        document.getElementById('add-motion-button').addEventListener('click', () => {
            const motionType = document.getElementById('motion-type-select').value;
            const proposer = document.getElementById('proposer-input').value.trim();
            const duration = document.getElementById('duration-input').value;
            const unit = document.getElementById('duration-unit-select').value;
            const canPropose = document.getElementById('can-propose').checked;
            const canVote = document.getElementById('can-vote').checked;

            if (!motionType) {
                alert('Please select a motion type.');
                return;
            }
            
            if (!proposer) {
                alert('Please enter a proposer name.');
                return;
            }

            // Create Card Element
            const card = document.createElement('div');
            card.className = 'card mb-3';

            card.innerHTML = `
                <div class="card-header">
                    ${motionType}
                </div>
                <div class="card-body">
                    <p class="card-text mb-3"><i class="bi bi-person-badge me-1"></i>Proposed by: <strong>${proposer}</strong></p>
                    <a href="/speakers" class="btn btn-primary btn-sm">
                        <i class="bi bi-people-fill me-1"></i> Speaker's list
                    </a>
                </div>
            `;
            
            // Append to container
            document.getElementById('motions-container').appendChild(card);
            
            // Scroll to the new card
            card.scrollIntoView({ behavior: 'smooth' });

            // Sync caucus timer duration to the Speakers page (via localStorage).
            // The speakers page reads this on load and also listens for live updates.
            try {
                const rawValue = parseInt(duration);
                const totalSeconds = unit === 'min' ? rawValue * 60 : rawValue;
                if (!isNaN(totalSeconds) && totalSeconds > 0) {
                    localStorage.setItem('caucusTimerDuration', JSON.stringify({
                        seconds: totalSeconds,
                        rawValue: rawValue,
                        unit: unit,
                        timestamp: Date.now()
                    }));
                }
            } catch (e) {
                console.warn('Could not sync caucus duration to localStorage:', e);
            }

            // Update Stats
            fetch('/api/stats/update-motion', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `name=${encodeURIComponent(proposer)}&type=${encodeURIComponent(motionType)}`
            }).catch(err => console.error('Error updating motion stats:', err));
        });

        // Initialize the page on load
        document.addEventListener('DOMContentLoaded', () => {
            populateMotionTypeDropdown();
        });

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
