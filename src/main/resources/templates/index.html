<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Delegate List - SciVerse Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    
    <!-- Theme initialization script - prevents flash -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode-loading');
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    
    <style>
        /* Styles for the Layout Structure */
        :root {
            --sidebar-width: 250px;
        }
        .sidebar {
            position: fixed;
            top: 80px;
            left: 0;
            height: calc(100% - 80px);
            width: var(--sidebar-width); 
            padding-top: 0.5rem; 
            background-color: #f8f9fa;
            z-index: 1000; 
            transition: all 0.3s;
        }
        .content {
            margin-left: var(--sidebar-width); 
            padding: 95px 20px 20px 20px; 
            position: relative; 
            z-index: 1;
            transition: all 0.3s;
        }
        /* Style for when the sidebar is collapsed */
        #sidebarMenu.collapsing, #sidebarMenu.collapse:not(.show) {
            margin-left: calc(-1 * var(--sidebar-width));
        }

        /* Modern Page Heading */
        .page-heading {
            font-size: 1.6rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            margin-bottom: 0;
        }

        /* Modern Delegates Card */
        .delegates-card {
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .table-responsive {
            background: #fff;
        }

        /* Modern Table Styles */
        .modern-delegates-table {
            margin: 0;
            background: #fff;
        }

        .modern-delegates-table thead {
            background: linear-gradient(135deg, #e2e8f0 0%, #cbd5e1 100%);
        }

        .modern-delegates-table thead th {
            padding: 18px 20px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #000000;
            text-align: center;
            vertical-align: middle;
            border: none;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        .modern-delegates-table thead th:first-child {
            text-align: left;
        }

        .modern-delegates-table tbody {
            background: #fff;
        }

        .modern-delegates-table tbody tr {
            border-bottom: 1px solid #f1f5f9;
            transition: background-color 0.15s ease;
        }

        .modern-delegates-table tbody tr:hover {
            background-color: #f8fafc;
        }

        .modern-delegates-table tbody tr:last-child {
            border-bottom: none;
        }

        .modern-delegates-table tbody td {
            padding: 16px 20px;
            text-align: center;
            vertical-align: middle;
            font-size: 0.95rem;
            color: #1e293b;
            font-weight: 600;
        }

        .modern-delegates-table tbody td:first-child {
            text-align: left;
            font-weight: 700;
            color: #0f172a;
        }

        /* Delegate Badge with Icon */
        .delegate-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .delegate-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3b82f6, #6366f1);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 1rem;
        }

        /* Modern Status Badges */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .status-badge.yes {
            background: #dcfce7;
            color: #166534;
        }

        .status-badge.no {
            background: #fee2e2;
            color: #991b1b;
        }

        /* Modern Action Buttons */
        .action-btn {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            border: none;
            transition: all 0.15s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            text-decoration: none;
        }

        .action-btn.edit {
            background: #dbeafe;
            color: #1e40af;
            text-decoration: none;
        }

        .action-btn.edit:hover {
            background: #bfdbfe;
            transform: translateY(-1px);
            text-decoration: none;
        }

        .action-btn.delete {
            background: #fee2e2;
            color: #991b1b;
            text-decoration: none;
        }

        .action-btn.delete:hover {
            background: #fecaca;
            transform: translateY(-1px);
            text-decoration: none;
        }

        .action-btn i {
            font-size: 1rem;
        }

        /* Add New Button */
        .btn-add-new {
            background: linear-gradient(135deg, #10b981, #059669);
            color: #fff;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            border: none;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .btn-add-new:hover {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
            color: #fff;
            text-decoration: none;
        }

        /* ================================
           DARK MODE STYLES
           ================================ */
        body.dark-mode {
            background: #0f172a;
        }

        body.dark-mode .content {
            background: #0f172a;
        }

        body.dark-mode .page-heading {
            color: #f1f5f9;
        }

        body.dark-mode .delegates-card {
            background: #1e293b;
            border-color: #334155;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }

        body.dark-mode .table-responsive {
            background-color: #1e293b !important;
        }

        body.dark-mode .modern-delegates-table {
            background-color: #1e293b !important;
        }

        body.dark-mode .modern-delegates-table thead {
            background: linear-gradient(135deg, #1e293b 0%, #334155 100%) !important;
        }

        body.dark-mode .modern-delegates-table thead th {
            color: #ffffff !important;
            background: transparent !important;
        }

        body.dark-mode .modern-delegates-table tbody {
            background-color: #1e293b !important;
        }

        body.dark-mode .modern-delegates-table tbody tr {
            border-bottom-color: #334155;
            background-color: #1e293b !important;
        }

        body.dark-mode .modern-delegates-table tbody tr:hover {
            background-color: #334155 !important;
        }

        body.dark-mode .modern-delegates-table tbody td {
            color: #e2e8f0 !important;
            background-color: transparent !important;
        }

        body.dark-mode .modern-delegates-table tbody td:first-child {
            color: #ffffff !important;
        }

        body.dark-mode .status-badge.yes {
            background: #065f46;
            color: #d1fae5;
        }

        body.dark-mode .status-badge.no {
            background: #7f1d1d;
            color: #fecaca;
        }

        body.dark-mode .action-btn.edit {
            background: #1e3a8a;
            color: #bfdbfe;
        }

        body.dark-mode .action-btn.edit:hover {
            background: #1e40af;
        }

        body.dark-mode .action-btn.delete {
            background: #7f1d1d;
            color: #fecaca;
        }

        body.dark-mode .action-btn.delete:hover {
            background: #991b1b;
        }

        /* Empty State Message */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #f8fafc;
            border-radius: 16px;
            border: 2px dashed #cbd5e1;
        }

        .empty-state-icon {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 1rem;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.5rem;
        }

        .empty-state-text {
            font-size: 0.95rem;
            color: #64748b;
            margin-bottom: 1.5rem;
        }

        body.dark-mode .empty-state {
            background: #334155;
            border-color: #475569;
        }

        body.dark-mode .empty-state-icon {
            color: #475569;
        }

        body.dark-mode .empty-state-title {
            color: #cbd5e1;
        }

        body.dark-mode .empty-state-text {
            color: #94a3b8;
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (NAVBAR) FRAGMENT -->
    <div th:replace="fragments :: header"></div>

    <!-- 2. SIDEBAR FRAGMENT -->
    <div th:replace="fragments :: sidebar"></div>

    <!-- 3. MAIN CONTENT AREA -->
    <div class="content">
        <div class="container-fluid">
            <!-- Heading with Icon -->
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="page-heading">
                    <i class="bi bi-people-fill me-2"></i>Delegate Records
                </h2>
                <a href="/add" class="btn-add-new">
                    <i class="bi bi-plus-circle-fill"></i> Add New
                </a>
            </div>

            <!-- Empty State Message (shown when no delegates) -->
            <div th:if="${#lists.isEmpty(presentations)}" class="empty-state">
                <div class="empty-state-icon">
                    <i class="bi bi-people"></i>
                </div>
                <div class="empty-state-title">No Delegates Found</div>
                <div class="empty-state-text">Get started by adding your first delegate to the session.</div>
                <a href="/add" class="btn-add-new">
                    <i class="bi bi-plus-circle-fill"></i> Add Your First Delegate
                </a>
            </div>

            <!-- Modern Delegates Table (shown when delegates exist) -->
            <div th:unless="${#lists.isEmpty(presentations)}" class="delegates-card">
                <div class="table-responsive">
                    <table class="table modern-delegates-table mb-0">
                        <thead>
                            <tr>
                                <th>Delegate Name</th>
                                <th>Presenting</th>
                                <th>Voting</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${presentations}">
                                <td>
                                    <div class="delegate-badge">
                                        <div class="delegate-icon">
                                            <i class="bi bi-person-fill"></i>
                                        </div>
                                        <span th:text="${p.name}">Delegate Name</span>
                                    </div>
                                </td>
                                <td>
                                    <span th:if="${p.presenting}" class="status-badge yes">
                                        <i class="bi bi-check-circle-fill"></i>Yes
                                    </span>
                                    <span th:unless="${p.presenting}" class="status-badge no">
                                        <i class="bi bi-x-circle-fill"></i>No
                                    </span>
                                </td>
                                <td>
                                    <span th:if="${p.voting}" class="status-badge yes">
                                        <i class="bi bi-check-circle-fill"></i>Yes
                                    </span>
                                    <span th:unless="${p.voting}" class="status-badge no">
                                        <i class="bi bi-x-circle-fill"></i>No
                                    </span>
                                </td>
                                <td>
                                    <a th:href="@{/edit/{id}(id=${p.id})}" class="action-btn edit me-2">
                                        <i class="bi bi-pencil-fill"></i>Edit
                                    </a>
                                    <a th:href="@{/delete/{id}(id=${p.id})}" class="action-btn delete" 
                                       onclick="return confirm('Are you sure you want to delete this record?');">
                                        <i class="bi bi-trash-fill"></i>Delete
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
