<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Unmoderated Caucus Timer - SciVerse Summit</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Theme initialization script - prevents flash of wrong theme -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.documentElement.classList.add('dark-mode-loading');
                if (document.body) document.body.classList.add('dark-mode');
                else document.addEventListener('DOMContentLoaded', () => document.body.classList.add('dark-mode'));
            }
        })();
    </script>

    <!-- Load Tone.js for audio generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.min.js"></script>
    <style>
        /* ================================
           THEME VARIABLES (Light Default)
           ================================ */
        :root {
            --sidebar-width: 250px;
            --bg-primary: #f8fafc;
            --bg-card: #ffffff;
            --bg-secondary: #f1f5f9;
            --bg-elevated: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --border-strong: #cbd5e1;
            --accent-primary: #3b82f6;
            --accent-success: #10b981;
            --accent-warning: #f59e0b;
            --accent-danger: #ef4444;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.10);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.12);
        }

        body.dark-mode {
            --bg-primary: #0f172a;
            --bg-card: #1e293b;
            --bg-secondary: #334155;
            --bg-elevated: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #cbd5e1;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --border-strong: #475569;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
            --shadow-md: 0 4px 16px rgba(0,0,0,0.3);
            --shadow-lg: 0 10px 30px rgba(0,0,0,0.4);
            --shadow-xl: 0 20px 50px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* ================================
           SIDEBAR LAYOUT
           ================================ */
        .sidebar {
            position: fixed; top: 80px; left: 0;
            height: calc(100% - 80px); width: var(--sidebar-width);
            padding-top: 0.5rem;
            background-color: var(--bg-secondary);
            z-index: 1000; transition: all 0.3s;
        }
        .content {
            margin-left: var(--sidebar-width);
            padding: 95px 20px 40px 20px;
            position: relative; z-index: 1;
            transition: all 0.3s;
            display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh;
        }
        @media (max-width: 991.98px) {
            .sidebar { width: 0; }
            .content { margin-left: 0; }
        }
        #sidebarMenu.collapsing, #sidebarMenu.collapse:not(.show) {
            transform: translateX(calc(-1 * var(--sidebar-width)));
            margin-left: 0;
        }

        /* ================================
           TIMER CARD
           ================================ */
        .timer-card {
            margin-top: 30px;
            width: 100%;
            max-width: 460px;
            background: var(--bg-card) !important;
            border: 1px solid var(--border-color) !important;
            border-radius: 20px !important;
            box-shadow: var(--shadow-xl) !important;
            padding: 32px !important;
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            color: var(--text-primary);
            position: relative;
            overflow: hidden;
        }
        .timer-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, #3b82f6, #8b5cf6, #ec4899);
        }

        /* Caucus title badge (replaces dark Bootstrap badge) */
        #caucus-title {
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
            color: white !important;
            padding: 8px 16px;
            font-size: 0.78rem !important;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border-radius: 999px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(59, 130, 246, 0.3);
            align-self: flex-start;
        }

        /* Section heading inside the card */
        .timer-card-heading {
            font-size: 0.78rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin: 18px 0 10px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .timer-card-heading i {
            color: var(--accent-primary);
            font-size: 1rem;
        }

        /* ================================
           TIMER DISPLAY BOX
           ================================ */
        .timer-display-box {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            color: var(--text-primary);
            padding: 28px 24px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            text-align: center;
            font-size: 4rem;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-variant-numeric: tabular-nums;
            letter-spacing: 0.02em;
            box-shadow: inset 0 1px 2px rgba(0,0,0,0.03);
            line-height: 1;
        }
        .timer-display-box #timer-text {
            flex: 1;
            text-align: center;
            text-shadow: 0 1px 0 rgba(255,255,255,0.6);
        }
        body.dark-mode .timer-display-box #timer-text {
            text-shadow: 0 1px 0 rgba(0,0,0,0.4);
        }
        .timer-display-box .btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            border-radius: 8px;
            padding: 6px 10px;
            transition: all 0.15s;
        }
        .timer-display-box .btn:hover {
            background: var(--bg-secondary);
            color: var(--text-primary);
            transform: scale(1.05);
        }

        /* ================================
           PROGRESS BAR
           ================================ */
        .progress-bar-container {
            height: 10px;
            background-color: var(--bg-secondary);
            border-radius: 5px;
            margin: 16px 0 4px 0;
            overflow: hidden;
        }
        .progress-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #10b981, #059669);
            border-radius: 5px;
            transition: width 0.3s linear, background-color 0.3s;
        }

        /* ================================
           FORM CONTROLS (Set Timer)
           ================================ */
        .form-control, .form-select {
            border: 1px solid var(--border-strong);
            border-radius: 10px;
            background: var(--bg-secondary);
            color: var(--text-primary);
            font-weight: 600;
            transition: all 0.15s;
            padding: 10px 12px;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            background: var(--bg-card);
            color: var(--text-primary);
        }
        .form-control:disabled, .form-select:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        /* Set button */
        #set-button {
            background: linear-gradient(135deg, #3b82f6, #2563eb) !important;
            border: none !important;
            border-radius: 10px;
            font-weight: 600;
            padding: 10px 20px;
            transition: all 0.2s;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        #set-button:hover:not(:disabled) {
            background: linear-gradient(135deg, #2563eb, #1d4ed8) !important;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.35);
        }
        #set-button:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* ================================
           CONTROL BUTTONS (Start / Pause / Reset)
           ================================ */
        .timer-controls {
            margin-top: 20px;
        }
        .timer-controls .btn {
            border-radius: 10px;
            font-weight: 600;
            padding: 12px 16px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border: none;
        }
        .timer-controls .btn-success {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
        }
        .timer-controls .btn-success:hover:not(:disabled) {
            background: linear-gradient(135deg, #059669, #047857);
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.35);
        }
        .timer-controls .btn-warning {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
        }
        .timer-controls .btn-warning:hover:not(:disabled) {
            background: linear-gradient(135deg, #d97706, #b45309);
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 4px 14px rgba(245, 158, 11, 0.35);
        }
        .timer-controls .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
        }
        .timer-controls .btn-secondary:hover:not(:disabled) {
            background: var(--border-color);
            color: var(--text-primary);
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
        }
        .timer-controls .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none !important;
        }

        /* ================================
           ALERT TOAST
           ================================ */
        .alert-custom {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 2000;
            border-radius: 12px;
            border: none;
            box-shadow: var(--shadow-lg);
            backdrop-filter: blur(10px);
            background: rgba(254, 243, 199, 0.95);
            color: #92400e;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        body.dark-mode .alert-custom {
            background: rgba(245, 158, 11, 0.18);
            color: #fbbf24;
            border: 1px solid rgba(245, 158, 11, 0.35);
        }
        .alert-custom::before {
            content: "\F33A"; /* bi-bell-fill */
            font-family: "bootstrap-icons";
            font-size: 1.1rem;
        }

        /* ================================
           DARK MODE TWEAKS
           ================================ */
        body.dark-mode .form-control,
        body.dark-mode .form-select {
            background: var(--bg-secondary);
        }
        body.dark-mode .form-control:focus,
        body.dark-mode .form-select:focus {
            background: var(--bg-secondary);
        }
        body.dark-mode .progress-bar-container {
            background-color: rgba(255, 255, 255, 0.08);
        }
        body.dark-mode .timer-display-box .btn {
            background: var(--bg-secondary);
            border-color: var(--border-strong);
            color: var(--text-secondary);
        }
        body.dark-mode .timer-display-box .btn:hover {
            background: var(--border-strong);
            color: var(--text-primary);
        }

        /* Subtle pulse animation when timer is running */
        @keyframes timer-pulse {
            0%, 100% { box-shadow: inset 0 1px 2px rgba(0,0,0,0.03), 0 0 0 0 rgba(59, 130, 246, 0.0); }
            50% { box-shadow: inset 0 1px 2px rgba(0,0,0,0.03), 0 0 0 6px rgba(59, 130, 246, 0.08); }
        }
        .timer-display-box.running {
            animation: timer-pulse 2s ease-in-out infinite;
        }
    </style>
</head>
<body>

    <!-- 1. HEADER (NAVBAR) FRAGMENT -->
    <div th:replace="fragments :: header"></div>

    <!-- 2. SIDEBAR FRAGMENT -->
    <div th:replace="fragments :: sidebar"></div>

    <!-- 3. MAIN CONTENT AREA -->
    <div class="content">
        <div class="card timer-card">

            <span class="badge" id="caucus-title">
                <i class="bi bi-people-fill"></i>
                <span>Unmoderated Caucus</span>
            </span>

            <!-- Timer Display -->
            <div class="timer-display-box" id="timer-display-box">
                <span id="timer-text">10:00</span>
                <button class="btn btn-sm" id="mute-button" title="Mute/Unmute sound">
                    <i class="bi bi-volume-up-fill"></i>
                </button>
            </div>

            <!-- Progress Bar -->
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progress-fill" style="width: 100%;"></div>
            </div>

            <!-- Set Timer Inputs -->
            <h6 class="timer-card-heading">
                <i class="bi bi-sliders"></i>
                <span>Set Duration</span>
            </h6>
            <div class="d-flex mb-2 gap-2 align-items-center">
                <input type="number" id="minutes-input" class="form-control" value="10" min="1" max="60" style="width: 90px;">
                <select id="unit-select" class="form-select" style="width: 90px;">
                    <option value="min">min</option>
                    <option value="sec">sec</option>
                </select>
                <button class="btn ms-auto" id="set-button">
                    <i class="bi bi-check2"></i>
                    <span>Set</span>
                </button>
            </div>

            <!-- Control Buttons -->
            <h6 class="timer-card-heading">
                <i class="bi bi-stopwatch-fill"></i>
                <span>Controls</span>
            </h6>
            <div class="d-flex justify-content-between gap-2 timer-controls">
                <button class="btn btn-success flex-fill" id="start-button">
                    <i class="bi bi-play-fill"></i> Start
                </button>
                <button class="btn btn-warning flex-fill" id="pause-button" disabled>
                    <i class="bi bi-pause-fill"></i> Pause
                </button>
                <button class="btn btn-secondary flex-fill" id="reset-button">
                    <i class="bi bi-arrow-counterclockwise"></i> Reset
                </button>
            </div>
        </div>
    </div>
    
    <!-- Custom Modal for Alerts (replacing alert()) -->
    <div class="alert alert-warning alert-dismissible fade show alert-custom d-none" role="alert" id="message-box">
        <span id="message-text"></span>
        <button type="button" class="btn-close" onclick="document.getElementById('message-box').classList.add('d-none');" aria-label="Close"></button>
    </div>

    <!-- JavaScript for Timer Logic and Audio -->
    <script>
        // DOM Elements
        const timerText = document.getElementById('timer-text');
        const timerDisplayBox = document.getElementById('timer-display-box');
        const minutesInput = document.getElementById('minutes-input');
        const unitSelect = document.getElementById('unit-select');
        const setButton = document.getElementById('set-button');
        const startButton = document.getElementById('start-button');
        const pauseButton = document.getElementById('pause-button');
        const resetButton = document.getElementById('reset-button');
        const progressFill = document.getElementById('progress-fill');
        const muteButton = document.getElementById('mute-button');

        // Timer State Variables
        let totalSeconds = 600; // 10 minutes default
        let timeRemaining = totalSeconds;
        let isRunning = false;
        let intervalId = null;
        let isMuted = false;

        // Audio Setup (using Tone.js)
        const synth = new Tone.MembraneSynth().toDestination();
        const chime = new Tone.PolySynth(Tone.Synth).toDestination();

        function playEndSound() {
            if (isMuted) return;
            // Play a noticeable, simple chime sequence
            chime.triggerAttackRelease(["C4", "E4", "G4"], "3n"); 
            // Also play a deep, simple drum hit
            synth.triggerAttackRelease("C1", "8n"); 
        }

        // Utility Functions
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = seconds % 60;
            return `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        }

        function updateDisplay() {
            timerText.textContent = formatTime(timeRemaining);
            const progress = (timeRemaining / totalSeconds) * 100;
            progressFill.style.width = `${progress}%`;
            // Color shift: green > amber > red as time runs out
            if (progress > 20) {
                progressFill.style.background = 'linear-gradient(90deg, #10b981, #059669)';
            } else if (progress > 10) {
                progressFill.style.background = 'linear-gradient(90deg, #f59e0b, #d97706)';
            } else {
                progressFill.style.background = 'linear-gradient(90deg, #ef4444, #dc2626)';
            }
        }

        function showMessage(text) {
            const msgBox = document.getElementById('message-box');
            document.getElementById('message-text').textContent = text;
            msgBox.classList.remove('d-none');
            // Hide after 5 seconds
            setTimeout(() => msgBox.classList.add('d-none'), 5000);
        }

        // Timer Core Logic
        function startTimer() {
            if (isRunning || timeRemaining <= 0) return;
            
            // Start audio context on first user interaction
            if (Tone.context.state !== 'running') {
                Tone.start();
            }

            isRunning = true;
            startButton.disabled = true;
            pauseButton.disabled = false;
            setButton.disabled = true;
            minutesInput.disabled = true;
            unitSelect.disabled = true;
            if (timerDisplayBox) timerDisplayBox.classList.add('running');

            intervalId = setInterval(() => {
                timeRemaining--;
                updateDisplay();

                if (timeRemaining <= 0) {
                    clearInterval(intervalId);
                    isRunning = false;
                    startButton.disabled = false;
                    pauseButton.disabled = true;
                    setButton.disabled = false;
                    minutesInput.disabled = false;
                    unitSelect.disabled = false;
                    if (timerDisplayBox) timerDisplayBox.classList.remove('running');
                    
                    playEndSound();
                    showMessage("TIME IS UP! Caucus complete.");
                    timeRemaining = 0; // Ensure it stays at 00:00
                    updateDisplay();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            clearInterval(intervalId);
            isRunning = false;
            startButton.disabled = false;
            pauseButton.disabled = true;
            if (timerDisplayBox) timerDisplayBox.classList.remove('running');
        }

        function resetTimer() {
            clearInterval(intervalId);
            isRunning = false;
            timeRemaining = totalSeconds;
            
            startButton.disabled = false;
            pauseButton.disabled = true;
            setButton.disabled = false;
            minutesInput.disabled = false;
            unitSelect.disabled = false;
            if (timerDisplayBox) timerDisplayBox.classList.remove('running');
            
            updateDisplay();
        }

        // Event Handlers
        setButton.addEventListener('click', () => {
            const inputVal = parseInt(minutesInput.value);
            const unit = unitSelect.value;
            
            if (isNaN(inputVal) || inputVal <= 0) {
                showMessage("Please enter a valid time (number greater than 0).");
                return;
            }

            // Calculate total seconds based on unit
            if (unit === 'min') {
                totalSeconds = inputVal * 60;
            } else {
                totalSeconds = inputVal;
            }

            // Limit max time for safety
            if (totalSeconds > 3600) { // Max 1 hour
                 totalSeconds = 3600;
                 minutesInput.value = 60;
                 unitSelect.value = 'min';
                 showMessage("Time limited to 60 minutes.");
            }

            resetTimer(); // Reset the timer with the new total seconds
        });

        startButton.addEventListener('click', startTimer);
        pauseButton.addEventListener('click', pauseTimer);
        resetButton.addEventListener('click', resetTimer);
        
        muteButton.addEventListener('click', () => {
            isMuted = !isMuted;
            const icon = muteButton.querySelector('i');
            if (isMuted) {
                icon.classList.remove('bi-volume-up-fill');
                icon.classList.add('bi-volume-mute-fill');
                muteButton.title = "Unmute sound";
            } else {
                icon.classList.remove('bi-volume-mute-fill');
                icon.classList.add('bi-volume-up-fill');
                muteButton.title = "Mute sound";
            }
        });

        // Initialize display on load
        updateDisplay();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
